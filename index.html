function getEquivalent(avg) {
  if (avg >= 97) return "1.00";
  if (avg >= 94) return "1.25";
  if (avg >= 91) return "1.50";
  if (avg >= 88) return "1.75";
  if (avg >= 85) return "2.00";
  if (avg >= 82) return "2.25";
  if (avg >= 79) return "2.50";
  if (avg >= 76) return "2.75";
  if (avg >= 75) return "3.00";
  return "5.00";
}

function handleSubmit() {
  const input = document.getElementById('studentInput').value.trim().toLowerCase();
  if (!input) return;
  const student = students.find(s => s.studentNumber.toLowerCase() === input);
  const results = document.getElementById('results');

  if (!student) {
    results.innerHTML = `<div class="bg-red-50 border border-red-200 rounded-xl p-5 text-red-700 text-center"><i data-lucide="alert-circle" class="w-5 h-5 inline mb-1"></i><p class="mt-1 font-medium">Student not found. Please check your Student Number.</p></div>`;
    lucide.createIcons();
    return;
  }

  const interpretation = student.interpretation;
  const finalEquiv = student.finalGradeEquivalent;
  const finalAvg = student.finalGradeAverage;

  // Build result based on status
  let resultsHTML = `
    <!-- Student Info Card -->
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 mb-4 relative">
      <div class="absolute top-6 right-6 bg-emerald-100 border border-emerald-300 rounded-lg px-4 py-2">
        <p class="text-lg font-bold text-emerald-700">${student.section}</p>
      </div>
      <p class="text-xs text-slate-400 uppercase tracking-wide mb-1">Student</p>
      <h2 class="heading-font text-2xl text-slate-800 mb-2">${student.name}</h2>
      <p class="text-slate-600 text-sm mb-1">${student.studentNumber.toUpperCase()}</p>
      <p class="text-slate-500 text-xs">${student.subject}</p>
    </div>
  `;

  if (interpretation === "Incomplete") {
    // Show incomplete message
    const remarkText = student.remarks.replace('Incomplete, ', '');
    resultsHTML += `
      <div class="bg-amber-50 border border-amber-300 rounded-xl p-6 mb-4">
        <div class="flex items-start gap-3">
          <i data-lucide="alert-triangle" class="w-6 h-6 text-amber-600 flex-shrink-0 mt-0.5"></i>
          <div>
            <h3 class="font-semibold text-amber-900 mb-2">INC</h3>
            <p class="text-sm text-amber-800 mb-3">${remarkText}</p>
            <p class="text-sm text-amber-700 font-medium">You have 1 year from the end of this term to complete the requirements. If not completed within this period, your grade will automatically lapse to a 5.0.</p>
          </div>
        </div>
      </div>
    `;
  } else {
    // Show passed student grades
    resultsHTML += `
      <!-- Final Grade Card -->
      <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 mb-4">
        <h3 class="font-semibold text-slate-700 mb-4">Final Grade</h3>
        
        <!-- Overall Final Grade -->
        <div class="mb-6 pb-6 border-b border-slate-100">
          <div class="grid grid-cols-3 gap-4 text-center">
            <div>
              <p class="text-xs text-slate-500 mb-1">Final Grade Average</p>
              <p class="text-3xl font-bold text-slate-800">${finalAvg}</p>
            </div>
            <div>
              <p class="text-xs text-slate-500 mb-1">Grade Equivalent</p>
              <p class="text-3xl font-bold text-emerald-600">${finalEquiv}</p>
            </div>
            <div>
              <p class="text-xs text-slate-500 mb-1">Status</p>
              <p class="text-3xl font-bold text-emerald-600">${interpretation}</p>
            </div>
          </div>
        </div>

        <!-- Midterm and Final Term Section -->
        <div class="grid grid-cols-2 gap-6 mb-6">
          <!-- Midterm -->
          <div>
            <p class="text-xs text-slate-400 uppercase tracking-wide font-semibold mb-3">Midterm</p>
            <div class="space-y-2">
              <div>
                <p class="text-xs text-slate-500">Grade Equivalent</p>
                <p class="text-xl font-bold text-slate-800">${student.midterm.grade}</p>
              </div>
              <div>
                <p class="text-xs text-slate-500">Average</p>
                <p class="text-lg font-semibold text-slate-700">${student.midterm.average}</p>
              </div>
              <button onclick="toggleDropdown('midtermDD')" class="w-full mt-3 flex items-center justify-between text-xs font-medium text-emerald-600 hover:text-emerald-700 py-1 px-2 bg-emerald-50 hover:bg-emerald-100 rounded">
                <span>View Breakdown</span><i data-lucide="chevron-down" class="w-3 h-3 transition-transform" id="midtermDD-icon"></i>
              </button>
            </div>
            <div id="midtermDD" class="dropdown-content mt-3">
              <div class="bg-slate-50 rounded-lg p-3 text-xs space-y-2">
                ${gradeRow('Studentship', student.midterm.studentship)}
                ${gradeRow('Activities', student.midterm.activities)}
                ${gradeRow('Recitation', student.midterm.recitation)}
                ${gradeRow('Quizzes', student.midterm.quizzes)}
                ${gradeRow('Exam', student.midterm.exam)}
              </div>
            </div>
          </div>

          <!-- Final Term -->
          <div>
            <p class="text-xs text-slate-400 uppercase tracking-wide font-semibold mb-3">Final Term</p>
            <div class="space-y-2">
              <div>
                <p class="text-xs text-slate-500">Grade Equivalent</p>
                <p class="text-xl font-bold text-slate-800">${student.final.grade}</p>
              </div>
              <div>
                <p class="text-xs text-slate-500">Average</p>
                <p class="text-lg font-semibold text-slate-700">${student.final.average}</p>
              </div>
              <button onclick="toggleDropdown('finalDD')" class="w-full mt-3 flex items-center justify-between text-xs font-medium text-emerald-600 hover:text-emerald-700 py-1 px-2 bg-emerald-50 hover:bg-emerald-100 rounded">
                <span>View Breakdown</span><i data-lucide="chevron-down" class="w-3 h-3 transition-transform" id="finalDD-icon"></i>
              </button>
            </div>
            <div id="finalDD" class="dropdown-content mt-3">
              <div class="bg-slate-50 rounded-lg p-3 text-xs space-y-2">
                ${gradeRow('Studentship', student.final.studentship)}
                ${gradeRow('Activities', student.final.activities)}
                ${gradeRow('Recitation', student.final.recitation)}
                ${gradeRow('Quizzes', student.final.quizzes)}
                ${gradeRow('Exam', student.final.exam)}
              </div>
            </div>
          </div>
        </div>
      </div>
    `;
  }

  results.innerHTML = resultsHTML;
  lucide.createIcons();
}

function gradeRow(label, value, bold) {
  const displayLabel = label === 'Exam' ? 'Major Exam' : label;
  return `<div class="flex justify-between"><span class="text-slate-500">${displayLabel}</span><span class="${bold ? 'font-bold text-slate-800' : 'text-slate-700'}">${value}</span></div>`;
}

function toggleDropdown(id) {
  const el = document.getElementById(id);
  const icon = document.getElementById(id + '-icon');
  el.classList.toggle('open');
  icon.style.transform = el.classList.contains('open') ? 'rotate(180deg)' : '';
}

function handleReset() {
  document.getElementById('studentInput').value = '';
  document.getElementById('results').innerHTML = '';
}

// Enter key support
document.getElementById('studentInput').addEventListener('keydown', e => { if (e.key === 'Enter') handleSubmit(); });

// Element SDK
const defaultConfig = {
  portal_title: "Student Grade Portal",
  background_color: "#f8fafc",
  surface_color: "#ffffff",
  text_color: "#1e293b",
  primary_action: "#059669",
  secondary_action: "#e2e8f0"
};

window.elementSdk.init({
  defaultConfig,
  onConfigChange: async (config) => {
    const title = config.portal_title || defaultConfig.portal_title;
    document.getElementById('portalTitle').textContent = title;
    document.getElementById('app').style.backgroundColor = config.background_color || defaultConfig.background_color;
  },
  mapToCapabilities: (config) => ({
    recolorables: [
      { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
      { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
      { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
      { get: () => config.primary_action || defaultConfig.primary_action, set: (v) => { config.primary_action = v; window.elementSdk.setConfig({ primary_action: v }); } },
      { get: () => config.secondary_action || defaultConfig.secondary_action, set: (v) => { config.secondary_action = v; window.elementSdk.setConfig({ secondary_action: v }); } }
    ],
    borderables: [],
    fontEditable: {
      get: () => config.font_family || defaultConfig.font_family || 'DM Sans',
      set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); }
    },
    fontSizeable: undefined
  }),
  mapToEditPanelValues: (config) => new Map([
    ["portal_title", config.portal_title || defaultConfig.portal_title]
  ])
});

lucide.createIcons();
</script>
